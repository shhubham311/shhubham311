name: Metrics

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches: ["main"]

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Generate metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: shhubham311
          filename: assets/metrics.svg
          template: classic

          # tolerate the flaky events API that habits/activity depend on
          retries: 6
          retries_delay: 300

          # dark, on-theme styling
          config_timezone: Asia/Kolkata
          base: header, activity, community, repositories, metadata

          # full-year contribution calendar (isometric)
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # detailed language breakdown by bytes written
          plugin_languages: yes
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8

          # when you actually code
          plugin_habits: yes
          plugin_habits_from: 100
          plugin_habits_facts: yes
          plugin_habits_charts: yes

          # recent activity stream
          plugin_activity: yes
          plugin_activity_limit: 5
          plugin_activity_days: 14
