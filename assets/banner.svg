<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" width="1200" height="340" role="img" aria-label="Shubham Kumar — ML and Web Engineer">
  <defs>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7C3AED" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#7C3AED" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#7C3AED" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.85" cy="0.18" r="0.7">
      <stop offset="0" stop-color="#7C3AED" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M28 0H0V28" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
    <style>
      .mono { font-family: ui-monospace, "SF Mono", "SFMono-Regular", Menlo, Consolas, "Liberation Mono", monospace; }
      .name { font-family: ui-monospace, "SF Mono", "SFMono-Regular", Menlo, Consolas, monospace; font-weight: 700; }
      .cursor { animation: blink 1.1s steps(1) infinite; }
      @keyframes blink { 0%,49% { opacity: 1 } 50%,100% { opacity: 0 } }
      .rule { transform-origin: 64px 196px; animation: draw 1.2s cubic-bezier(.2,.8,.2,1); }
      @keyframes draw { from { transform: scaleX(0) } to { transform: scaleX(1) } }
      .pulse { transform-box: fill-box; transform-origin: center; animation: pulse 2.4s ease-in-out infinite; }
      @keyframes pulse { 0%,100% { opacity: .4 } 50% { opacity: 1 } }
      .n1 { animation: float 6s ease-in-out infinite; }
      .n2 { animation: float 6s ease-in-out infinite 1.5s; }
      .n3 { animation: float 6s ease-in-out infinite 3s; }
      @keyframes float { 0%,100% { opacity:.5 } 50% { opacity:1 } }
    </style>
  </defs>

  <rect width="1200" height="340" rx="16" fill="#0d1117"/>
  <rect width="1200" height="340" rx="16" fill="url(#grid)"/>
  <rect width="1200" height="340" rx="16" fill="url(#glow)"/>
  <rect x="0.5" y="0.5" width="1199" height="339" rx="16" fill="none" stroke="#ffffff" stroke-opacity="0.07"/>

  <!-- decorative ML graph -->
  <g stroke="#7C3AED" stroke-opacity="0.45" stroke-width="1.5">
    <line x1="980" y1="92"  x2="1068" y2="150"/>
    <line x1="980" y1="92"  x2="1058" y2="240"/>
    <line x1="1068" y1="150" x2="1058" y2="240"/>
    <line x1="1068" y1="150" x2="1132" y2="112"/>
    <line x1="1058" y1="240" x2="1132" y2="202"/>
  </g>
  <g fill="#7C3AED">
    <circle class="n1" cx="980"  cy="92"  r="5"/>
    <circle class="n2" cx="1068" cy="150" r="6"/>
    <circle class="n3" cx="1058" cy="240" r="5"/>
    <circle class="n2" cx="1132" cy="112" r="4"/>
    <circle class="n1" cx="1132" cy="202" r="4"/>
  </g>

  <!-- terminal prompt -->
  <text class="mono" x="64" y="92" font-size="17" fill="#7C3AED">~/shubham<tspan fill="#6e7681"> $ whoami</tspan></text>
  <rect class="cursor" x="257" y="78" width="10" height="18" fill="#7C3AED"/>

  <!-- name -->
  <text class="name" x="62" y="170" font-size="62" fill="#e6edf3" letter-spacing="-1">Shubham Kumar</text>

  <!-- animated accent rule -->
  <rect class="rule" x="64" y="192" width="360" height="3" rx="2" fill="url(#edge)"/>

  <!-- role -->
  <text class="mono" x="64" y="236" font-size="20" fill="#9ca3af">ML <tspan fill="#7C3AED">&#215;</tspan> Web engineer &#8212; building past the demo, into production.</text>

  <!-- status + stack -->
  <circle class="pulse" cx="72" cy="284" r="5" fill="#3fb950"/>
  <text class="mono" x="86" y="289" font-size="14" fill="#8b949e">open to collaborations</text>
  <text class="mono" x="300" y="289" font-size="14" fill="#6e7681">Python &#183; PyTorch &#183; React &#183; MLOps &#183; Docker</text>
</svg>
